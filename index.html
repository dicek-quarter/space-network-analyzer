<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Network Traffic Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --bg-deep:#0a0e1a; --bg-panel:#0f1525; --bg-card:#141c30; --border:#1e2d4a;
  --cyan:#00d4ff; --cyan-dim:rgba(0,212,255,.15); --cyan-glow:rgba(0,212,255,.4);
  --alert:#ff6b35; --alert-dim:rgba(255,107,53,.15);
  --green:#39ff14; --green-dim:rgba(57,255,20,.12);
  --warn:#ffc832; --muted:#4a5570; --text:#c8d4ee; --text-dim:#7a8aaa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-deep);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* Header */
header{border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;background:var(--bg-panel);position:relative;overflow:hidden;}
header::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--cyan-dim),transparent 60%);pointer-events:none;}
.logo-icon{width:34px;height:34px;border:1.5px solid var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px var(--cyan-glow);flex-shrink:0;}
.logo-dot{width:8px;height:8px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);}
.logo-text{font-family:'Space Mono',monospace;font-size:14px;letter-spacing:.08em;color:var(--cyan);line-height:1.2;}
.logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;}
.header-status{margin-left:auto;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);display:flex;gap:16px;align-items:center;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px;}
.status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green);}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 56px);}
@media(max-width:768px){
  .layout{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .sidebar{min-width:268px;width:268px;height:auto;min-height:calc(100vh - 56px);}
  .main{min-width:500px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important;}
}

/* Sidebar */
.sidebar{width:286px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-section{padding:18px 18px;border-bottom:1px solid var(--border);}
.section-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}

/* Drop zone */
.drop-zone{border:1.5px dashed var(--border);border-radius:6px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--cyan);background:var(--cyan-dim);}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.drop-icon{font-size:22px;margin-bottom:6px;}
.drop-text{font-size:11px;color:var(--text-dim);line-height:1.5;}
.drop-text em{color:var(--cyan);font-style:normal;}
.btn-sample{width:100%;margin-top:8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:11px;padding:7px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.btn-sample:hover{border-color:var(--cyan);color:var(--cyan);}

/* Inputs */
label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;}
input[type=text],input[type=number],select{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:7px 9px;outline:none;transition:border-color .15s;margin-bottom:9px;}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--cyan);}
select option{background:var(--bg-card);}
.cap-unit{display:flex;align-items:center;}
.cap-unit input{border-radius:4px 0 0 4px!important;margin-bottom:0!important;flex:1;}
.cap-unit-label{background:var(--bg-deep);border:1px solid var(--border);border-left:none;border-radius:0 4px 4px 0;padding:0 9px;height:33px;display:flex;align-items:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;}

/* Run btn */
.btn-run{width:100%;background:linear-gradient(135deg,#005f7f,#003f5a);border:1px solid var(--cyan);border-radius:5px;color:var(--cyan);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.05em;padding:11px;cursor:pointer;transition:all .2s;box-shadow:0 0 16px rgba(0,212,255,.12);}
.btn-run:hover{background:linear-gradient(135deg,#007090,#004f6a);box-shadow:0 0 24px rgba(0,212,255,.28);}

/* Main */
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px;}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.card-header{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-panel);flex-wrap:wrap;gap:8px;}
.card-title{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);}
.card-body{padding:18px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi{background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
.kpi-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px;}
.kpi-val.danger{color:var(--alert);text-shadow:0 0 10px rgba(255,107,53,.4);}
  .kpi-click{cursor:pointer;transition:border-color .15s,background .15s;}
  .kpi-click:hover{border-color:var(--cyan);background:rgba(0,212,255,0.06);}
  .kpi-hint{font-size:9px;color:var(--text-dim);margin-top:5px;letter-spacing:.06em;}
.kpi-label{font-size:10px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;}

/* Table */
.util-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:12px;}
th{text-align:left;padding:8px 11px;color:var(--text-dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg-panel);}
td{padding:7px 11px;border-bottom:1px solid rgba(30,45,74,.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,212,255,.03);}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;}
.badge-alert{background:var(--alert-dim);color:var(--alert);border:1px solid rgba(255,107,53,.3);}
.badge-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(57,255,20,.25);}
.badge-warn{background:rgba(255,200,50,.12);color:var(--warn);border:1px solid rgba(255,200,50,.3);}
.bar-wrap{display:flex;align-items:center;gap:7px;}
.bar-bg{flex:1;height:5px;background:var(--bg-deep);border-radius:3px;overflow:hidden;min-width:70px;}
.bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s ease;}
.bar-fill.warn{background:var(--warn);}
.bar-fill.alert{background:var(--alert);box-shadow:0 0 6px rgba(255,107,53,.6);}
.bar-pct{font-size:11px;min-width:38px;text-align:right;}
canvas{display:block;width:100%;}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.legend-item{display:flex;gap:5px;align-items:center;font-size:11px;color:var(--text-dim);}
.legend-swatch{width:14px;height:4px;border-radius:2px;}
.alert-banner{background:var(--alert-dim);border:1px solid rgba(255,107,53,.4);border-radius:6px;padding:11px 14px;display:flex;gap:9px;align-items:flex-start;font-size:12px;line-height:1.6;}
.alert-banner-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;gap:12px;}
.empty-icon{font-size:38px;opacity:.3;}
.empty-title{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);}

/* Map */
#map-container{width:100%;position:relative;background:#050810;overflow:hidden;}#map-container.globe-mode{touch-action:none;cursor:grab;}#map-container.globe-mode.dragging{cursor:grabbing;}
#world-canvas{display:block;width:100%;}

/* Tooltip */
#tooltip{position:fixed;background:rgba(9,14,26,.96);border:1px solid var(--cyan);border-radius:6px;padding:10px 14px;font-size:12px;pointer-events:none;display:none;z-index:999;max-width:260px;line-height:1.7;}
#tooltip .tt-title{font-family:'Space Mono',monospace;color:var(--cyan);font-size:11px;margin-bottom:4px;}

/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;position:relative;}
#modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
#modal-close:hover{color:var(--text);}
#modal h3{font-family:'Space Mono',monospace;color:var(--cyan);font-size:13px;margin-bottom:14px;}
.link-row{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.link-row:last-child{border-bottom:none;}
.link-id{font-family:'Space Mono',monospace;color:var(--text-dim);font-size:11px;min-width:130px;}
.link-coords{color:var(--text-dim);font-size:10px;}


/* Map projection toggle */
.proj-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.proj-btn{background:transparent;border:none;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;padding:5px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.proj-btn.active{background:var(--cyan-dim);color:var(--cyan);}
.proj-btn:hover:not(.active){color:var(--text);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div id="tooltip"><div class="tt-title" id="tt-title"></div><div id="tt-body"></div></div>
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
  </div>
</div>

<header>
  <div class="logo-icon"><div class="logo-dot"></div></div>
  <div>
    <div class="logo-text">SPACE NET ANALYZER</div>
    <div class="logo-sub">World Traffic Map</div>
  </div>
  <div class="header-status"><span id="status-text"><span class="status-dot"></span>NO DATA</span></div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">ログファイル読み込み</div>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".csv,.log,.txt">
        <div class="drop-icon">📡</div>
        <div class="drop-text">CSVをドロップ<br>または<em>クリックして選択</em></div>
      </div>
      <button class="btn-sample" onclick="loadSampleData()">▶ サンプルデータを使用</button>
      <div id="file-info" style="margin-top:7px;font-size:10px;color:var(--text-dim);font-family:'Space Mono',monospace;"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">分析期間</div>
      <label>開始 (yyyymmddhhmmss)</label>
      <input type="text" id="range-start" placeholder="全期間" maxlength="14">
      <label>終了 (yyyymmddhhmmss)</label>
      <input type="text" id="range-end" placeholder="全期間" maxlength="14">
      <label>時間集計単位</label>
      <select id="agg-unit">
        <option value="60">1分</option>
        <option value="300">5分</option>
        <option value="600">10分</option>
        <option value="1800">30分</option>
        <option value="3600" selected>1時間</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="section-label">リンク容量設定（全リンク一律）</div>
      <label>回線容量</label>
      <div class="cap-unit">
        <input type="number" id="link-capacity-mbps" value="10" min="0.001" step="any">
        <span class="cap-unit-label">Mbps</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">アラート閾値</div>
      <label>警告しきい値 (%)</label>
      <input type="number" id="thresh-warn" value="70" min="1" max="100">
      <label>危険しきい値 (%)</label>
      <input type="number" id="thresh-alert" value="90" min="1" max="100">
    </div>

    <div class="sidebar-section">
      <button class="btn-run" onclick="runAnalysis()">▶ 分析実行</button>
    </div>
  </aside>

  <main class="main" id="main-content">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🌍</div>
      <div class="empty-title">データを読み込んで分析を実行してください</div>
      <div style="font-size:11px;color:var(--muted);max-width:340px;line-height:1.9;margin-top:4px">
        CSVフォーマット（ヘッダー行不要）:<br>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--cyan)">
        時刻,エンドエンド,帯域(bps),リンクID,緯度,経度
        </span>
      </div>
    </div>
    <div id="result-area" style="display:none;flex-direction:column;gap:20px;"></div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let rawRows = [];
let analysisResult = null;

// ══════════════════════════════════════════════════════
// FILE HANDLING
// ══════════════════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if(f) readFile(f);
});
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if(f) readFile(f);
});

function readFile(f) {
  const r = new FileReader();
  r.onload = ev => {
    rawRows = parseCSV(ev.target.result);
    document.getElementById('file-info').textContent = `✓ ${f.name}  (${rawRows.length} 件)`;
    setStatus(true, `${rawRows.length} レコード読み込み済`);
  };
  r.readAsText(f, 'utf-8');
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.trim().split(/\r?\n/)) {
    if (!line.trim() || line.startsWith('#')) continue;
    const c = line.split(',').map(s => s.trim());
    if (c.length < 6) continue;
    const [ts, ee, bps, linkId, lat, lon] = c;
    if (isNaN(+bps) || isNaN(+lat) || isNaN(+lon)) continue;
    rows.push({ ts: +ts, ee: String(ee), bps: +bps, linkId: String(linkId), lat: +lat, lon: +lon });
  }
  return rows;
}

// ══════════════════════════════════════════════════════
// SAMPLE DATA
// ══════════════════════════════════════════════════════
function loadSampleData() {
  const lines = SAMPLE_CSV.trim().split('\n');
  rawRows = parseCSV(SAMPLE_CSV);
  document.getElementById('file-info').textContent = `✓ サンプルデータ (${rawRows.length} 件)`;
  setStatus(true, `サンプル ${rawRows.length} レコード`);
}

// ══════════════════════════════════════════════════════
// ANALYSIS
// ══════════════════════════════════════════════════════
function tsSec(ts14) {
  const s = String(ts14).padStart(14,'0');
  return Date.UTC(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8),
                  +s.slice(8,10),+s.slice(10,12),+s.slice(12,14)) / 1000;
}

function runAnalysis() {
  stopPlay();
  if (!rawRows.length) { alert('データを読み込んでください'); return; }

  const rangeStart = +document.getElementById('range-start').value || 0;
  const rangeEnd   = +document.getElementById('range-end').value   || 99999999999999;
  const aggSec     = +document.getElementById('agg-unit').value;
  const capBps     = (+document.getElementById('link-capacity-mbps').value || 10) * 1e6;
  const thWarn     = +document.getElementById('thresh-warn').value;
  const thAlert    = +document.getElementById('thresh-alert').value;

  const filtered = rawRows.filter(r => r.ts >= rangeStart && r.ts <= rangeEnd);
  if (!filtered.length) { alert('指定期間にデータがありません'); return; }

  // --- bucket: (ee, bucket_epoch) → { bps[], links: Set, waypoints: Map<linkId,{lat,lon}> }
  const eeMap = {}; // ee -> { bucket -> { bpsArr, waypoints:{linkId->{lat,lon}} } }

  for (const r of filtered) {
    const bucket = Math.floor(tsSec(r.ts) / aggSec) * aggSec;
    if (!eeMap[r.ee]) eeMap[r.ee] = {};
    if (!eeMap[r.ee][bucket]) eeMap[r.ee][bucket] = { bpsArr:[], waypoints:{} };
    const slot = eeMap[r.ee][bucket];
    slot.bpsArr.push(r.bps);
    slot.waypoints[r.linkId] = { lat: r.lat, lon: r.lon };
  }

  // --- per-ee stats
  const eeStats = {};
  for (const [ee, bmap] of Object.entries(eeMap)) {
    const buckets = Object.entries(bmap).sort((a,b)=>+a[0]-+b[0]).map(([b, slot]) => {
      const avg = slot.bpsArr.reduce((s,v)=>s+v,0) / slot.bpsArr.length;
      return { bucket:+b, avgBps:avg, util:avg/capBps*100, waypoints:slot.waypoints };
    });
    const utils = buckets.map(x=>x.util);
    eeStats[ee] = {
      buckets,
      maxU: Math.max(...utils),
      avgU: utils.reduce((s,v)=>s+v,0)/utils.length,
      alertN: utils.filter(u=>u>=thAlert).length,
      warnN:  utils.filter(u=>u>=thWarn&&u<thAlert).length,
      avgBps: buckets.reduce((s,b)=>s+b.avgBps,0)/buckets.length,
    };
  }

  // Collect all buckets across ee for slider
  const allBuckets = [...new Set(
    Object.values(eeStats).flatMap(s=>s.buckets.map(b=>b.bucket))
  )].sort((a,b)=>a-b);

  analysisResult = { eeStats, allBuckets, capBps, thWarn, thAlert, filtered };

  // renderResults先にDOMを生成（スライダーはその中で作られる）
  renderResults(analysisResult);

  // スライダーはrenderResults()後に存在する
  const slider = document.getElementById('time-slider');
  if (slider) {
    slider.min = 0; slider.max = allBuckets.length - 1; slider.value = 0;
    updateSliderLabel(allBuckets[0]);
    slider.oninput = () => {
      stopPlay();
      updateSliderLabel(allBuckets[+slider.value]);
      drawWorldMap(analysisResult, allBuckets[+slider.value]);
    };
  }

  setStatus(true, `分析完了 — ${Object.keys(eeStats).length} 通信区間`);
}

function updateSliderLabel(bucket) {
  const d = new Date(bucket * 1000);
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('slider-label').textContent =
    `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} `+
    `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
}

// ══════════════════════════════════════════════════════
// RENDER RESULTS
// ══════════════════════════════════════════════════════
function renderResults(res) {
  const { eeStats, allBuckets, thWarn, thAlert, filtered } = res;
  document.getElementById('empty-state').style.display = 'none';
  const area = document.getElementById('result-area');
  area.style.display = 'flex'; area.style.flexDirection = 'column'; area.style.gap = '20px';
  area.innerHTML = '';

  const ees = Object.keys(eeStats);
  const allUtils = ees.flatMap(e => eeStats[e].buckets.map(b=>b.util));
  const alertCnt = ees.filter(e=>eeStats[e].maxU>=thAlert).length;
  const peakUtil = Math.max(...allUtils);

  // KPI
  area.insertAdjacentHTML('beforeend',`
    <div class="card">
      <div class="card-header">
        <span class="card-title">サマリー</span>
        <div class="legend">
          <span class="legend-item"><span class="legend-swatch" style="background:var(--green)"></span>正常</span>
          <span class="legend-item"><span class="legend-swatch" style="background:var(--warn)"></span>警告 ≥${thWarn}%</span>
          <span class="legend-item"><span class="legend-swatch" style="background:var(--alert)"></span>危険 ≥${thAlert}%</span>
        </div>
      </div>
      <div class="card-body">
        <div class="kpi-grid">
          <div class="kpi kpi-click" onclick="showKpiDetail('routes')"><div class="kpi-val">${ees.length}</div><div class="kpi-label">通信区間数</div><div class="kpi-hint">▸ 詳細</div></div>
          <div class="kpi kpi-click" onclick="showKpiDetail('peak')"><div class="kpi-val ${peakUtil>=thAlert?'danger':''}">${peakUtil.toFixed(1)}%</div><div class="kpi-label">最大収容率</div><div class="kpi-hint">▸ 詳細</div></div>

// MOLLWEIDE PROJECTION
// ══════════════════════════════════════════════════════
function mollweide(lon, lat, W, H) {
  // Returns canvas [x, y] for given lon/lat (degrees)
  const lonRad = lon * Math.PI / 180;
  const latRad = lat * Math.PI / 180;
  let theta = latRad;
  for (let i = 0; i < 20; i++) {
    theta -= (2*theta + Math.sin(2*theta) - Math.PI*Math.sin(latRad)) / (2 + 2*Math.cos(2*theta));
  }
  const x = (2 * Math.SQRT2 / Math.PI) * lonRad * Math.cos(theta);
  const y = Math.SQRT2 * Math.sin(theta);
  // Map [-2√2..2√2] x [-√2..√2] to canvas
  const cx = W/2 + x * W / (4 * Math.SQRT2);
  const cy = H/2 - y * H / (2 * Math.SQRT2);
  return [cx, cy];
}

  // centerLon: for Mercator antimeridian split (undefined for globe)

  // Draw a polygon, splitting at the antimeridian for flat projections
  function drawPoly(rawPts, fill, stroke, lw) {
    if (isGlobe) {
      // Globe: just project, skip invisible points
      ctx.beginPath(); let first = true;
      for (const [lon, lat] of rawPts) {
        const p = projectFn(lon, lat);
        if (!p.visible) { first = true; continue; }
        first ? ctx.moveTo(p.px, p.py) : ctx.lineTo(p.px, p.py);
        first = false;
      }
      ctx.closePath();
    } else {
      // Flat (Mercator): split polygon at antimeridian
      // Normalise all longitudes relative to centerLon → [-180,180]
      const pts = rawPts.map(([lon, lat]) => {
        let d = lon - (centerLon || 0);
        while (d >  180) d -= 360;
        while (d < -180) d += 360;
        return [d + (centerLon || 0), lat];

      // Split into segments where consecutive points jump >180°

      for (let i = 1; i < pts.length; i++) {

      }

      for (const s of segs) {
        if (s.length < 2) continue;
        ctx.beginPath(); let first = true;
        for (const [lon, lat] of s) {
          const [px, py] = projectFn(lon, lat);
          first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          first = false;
        }
        ctx.closePath();
      }
    }
    ctx.fillStyle = fill; ctx.fill();

// ── Playback ──────────────────────────────────────────────────────────────
function togglePlay() {
  isPlaying ? stopPlay() : startPlay();
}

function startPlay() {
  const slider = document.getElementById('time-slider');
  if (!slider || +slider.max === 0) return;
  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏹';
  document.getElementById('btn-play').style.borderColor = 'var(--alert)';
  document.getElementById('btn-play').style.color = 'var(--alert)';

  function step() {
    const slider = document.getElementById('time-slider');
    if (!slider || !isPlaying) return;
    let next = +slider.value + 1;
    if (next > +slider.max) next = 0; // loop
    slider.value = next;
    if (analysisResult) {
      const bucket = analysisResult.allBuckets[next];
      updateSliderLabel(bucket);
      drawWorldMap(analysisResult, bucket);
    }
    const ms = +document.getElementById('play-speed').value;
    playbackTimer = setTimeout(step, ms);
  }
  const ms = +document.getElementById('play-speed').value;
  playbackTimer = setTimeout(step, ms);
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(playbackTimer);
  playbackTimer = null;
  const btn = document.getElementById('btn-play');
  if (btn) {
    btn.textContent = '▶';
    btn.style.borderColor = 'var(--cyan)';
    btn.style.color = 'var(--cyan)';
  }
}


// ── Projection mode switch ─────────────────────────────────────────────
function setProj(mode) {
  projMode = mode;
  dragState = null; // clear any in-progress drag
  document.getElementById('btn-globe').classList.toggle('active', mode==='globe');
  document.getElementById('btn-moll' ).classList.toggle('active', mode==='mercator');
  document.getElementById('map-card-title').textContent =
    mode === 'globe' ? 'トラフィックマップ — 地球儀' : 'トラフィックマップ — メルカトル（東京中心）';
  const mc = document.getElementById('map-container');
  if (mc) mc.classList.toggle('globe-mode', mode==='globe');
  const canvas = document.getElementById('world-canvas');
  if (canvas) { canvas.width = 0; canvas.height = 0; }
  cancelAnimationFrame(animFrameId);
  if (lastRes && lastRenderBucket !== null) drawWorldMap(lastRes, lastRenderBucket);
}

// ── Globe rotation state ──────────────────────────────────────────────────
let globeLon = 140; // center longitude (deg)
let globeLat =  30; // center latitude  (deg)
let dragState = null; // {startX,startY,startLon,startLat}
let lastRenderBucket = null;
let lastRes = null;
let animFrameId = null;
let projMode = 'globe'; // 'globe' | 'mercator'
let hitAreas = [];
let playbackTimer = null;
let isPlaying = false;

// ── Touch/mouse drag ──────────────────────────────────────────────────────
function initGlobeDrag() {
  const mc = document.getElementById('map-container');
  if (mc._dragInit) return;
  mc._dragInit = true;

  function startDrag(cx, cy) {
    if (projMode !== 'globe') return;
    dragState = { startX:cx, startY:cy, startLon:globeLon, startLat:globeLat };
    mc.classList.add('dragging');
  }
  function moveDrag(cx, cy) {
    if (!dragState || projMode !== 'globe') return;
    const canvas = document.getElementById('world-canvas');
    const R = Math.min(canvas.offsetWidth, canvas.offsetHeight) * 0.46;
    const dLon = (cx - dragState.startX) / R * 90;
    const dLat = (cy - dragState.startY) / R * 90;
    globeLon = dragState.startLon - dLon;
    globeLat = dragState.startLat + dLat;
    if (lastRes && lastRenderBucket !== null) {
      cancelAnimationFrame(animFrameId);
      drawGlobe(lastRes, lastRenderBucket);
    }
  }
  function endDrag() { dragState = null; mc.classList.remove('dragging'); }

  mc.addEventListener('mousedown',  e => { if (projMode !== 'globe') return; e.preventDefault(); startDrag(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  window.addEventListener('mouseup',   () => endDrag());

  mc.addEventListener('touchstart', e => { if (projMode !== 'globe') return; e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  mc.addEventListener('touchmove',  e => { if (projMode !== 'globe') return; e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); },  {passive:false});
  mc.addEventListener('touchend',   () => endDrag());
}

// ── Orthographic projection helpers ──────────────────────────────────────
function toRad(d) { return d * Math.PI / 180; }

// Rotate lon/lat by globe center, returns {x,y,z} on unit sphere
function geoToXYZ(lon, lat) {
  const la = toRad(lat), lo = toRad(lon);
  return {
    x: Math.cos(la) * Math.cos(lo),
    y: Math.cos(la) * Math.sin(lo),
    z: Math.sin(la)
  };
}

// Correct orthographic projection with full lon+lat rotation
function orthoProject(lon, lat, cLon, cLat, cx, cy, R) {
  const la  = toRad(lat),  lo  = toRad(lon);
  const cla = toRad(cLat), clo = toRad(cLon);
  // Convert to 3D unit sphere
  const x0 = Math.cos(la) * Math.cos(lo);
  const y0 = Math.cos(la) * Math.sin(lo);
  const z0 = Math.sin(la);
  // Rotate around Z-axis by -cLon (bring center longitude to front)
  const x1 =  x0 * Math.cos(clo) + y0 * Math.sin(clo);
  const y1 = -x0 * Math.sin(clo) + y0 * Math.cos(clo);
  const z1 =  z0;
  // Rotate around Y-axis by cLat (tilt for center latitude)
  const x2 =  x1 * Math.cos(cla) + z1 * Math.sin(cla);
  const y2 =  y1;
  const z2 = -x1 * Math.sin(cla) + z1 * Math.cos(cla);
  // x2 > 0 means visible (facing viewer)
  // Screen coords: y2 maps to X, -z2 maps to Y
  return { px: cx + y2 * R, py: cy - z2 * R, visible: x2 > -0.01, Z: x2 };
}

// ── Main globe draw ───────────────────────────────────────────────────────
function drawWorldMap(res, activeBucket) {
  if (projMode === 'globe') drawGlobe(res, activeBucket);
  else drawMercator(res, activeBucket);
}

// ══════════════════════════════════════════════════════
// MOLLWEIDE PROJECTION MAP
// ══════════════════════════════════════════════════════
function drawMercator(res, activeBucket) {
  lastRes = res; lastRenderBucket = activeBucket;
  cancelAnimationFrame(animFrameId);

  const canvas = document.getElementById('world-canvas');
  if (!canvas) return;
  const container = document.getElementById('map-container');
  container.classList.remove('globe-mode'); dragState = null;
  const dpr = window.devicePixelRatio || 1;
  const W = container.offsetWidth;
  const H = Math.round(W * 0.56);
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.scale(dpr, dpr);

  // Center longitude = Tokyo (139.69°E)
  const CENTER_LON = 139.69;
  const MAX_LAT = 82; // Mercator clip latitude

  // Mercator projection centered on CENTER_LON
  function merc(lon, lat) {
    // Normalize lon relative to center, wrap to [-180,180]
    let dLon = lon - CENTER_LON;
    while (dLon >  180) dLon -= 360;
    while (dLon < -180) dLon += 360;
    const latClamped = Math.max(-MAX_LAT, Math.min(MAX_LAT, lat));
    const x = W/2 + (dLon / 180) * (W / 2);
    const latR = latClamped * Math.PI / 180;
    const mercY = Math.log(Math.tan(Math.PI/4 + latR/2));
    const maxMercY = Math.log(Math.tan(Math.PI/4 + MAX_LAT*Math.PI/360));
    const y = H/2 - (mercY / maxMercY) * (H / 2);
    return [x, y];
  }

  // Background
  ctx.fillStyle = '#050810'; ctx.fillRect(0, 0, W, H);

  // Ocean
  const og = ctx.createLinearGradient(0, 0, 0, H);
  og.addColorStop(0,   '#1a6aaa');
  og.addColorStop(0.4, '#155e9a');
  og.addColorStop(0.7, '#0e4878');
  og.addColorStop(1,   '#09325a');
  ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);

  // Graticule
  ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 0.3;
  for (let lat = -60; lat <= 60; lat += 30) {
    const [x0] = merc(-180 + CENTER_LON + 0.01, lat);
    const [x1] = merc( 180 + CENTER_LON - 0.01, lat);
    const [, y] = merc(CENTER_LON, lat);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let lon = -180; lon <= 180; lon += 30) {
    const [x] = merc(lon + CENTER_LON, 0);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Land
  drawLandColored(ctx, (lon, lat) => merc(lon, lat), false, CENTER_LON);

  // Map border
  ctx.strokeStyle = 'rgba(80,150,255,0.30)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(0, 0, W, H);

  // ── Arcs ────────────────────────────────────────────────────────────────
  const { eeStats, thWarn, thAlert } = res;
  hitAreas = [];
  const edgeLabels = [];
  const mercNodes  = [];

  for (const [ee, stat] of Object.entries(eeStats)) {
    const bObj = stat.buckets.reduce((prev, cur) =>
      Math.abs(cur.bucket - activeBucket) < Math.abs(prev.bucket - activeBucket) ? cur : prev);
    const util = bObj.util;
    const wpts = Object.entries(bObj.waypoints);
    if (wpts.length < 2) continue;

    let rgb;
    if (util >= thAlert)     rgb = '255,107,53';
    else if (util >= thWarn) rgb = '255,200,50';
    else                     rgb = '0,212,255';

    const maxBps = Math.max(...Object.values(eeStats).map(s => s.avgBps));
    const thick  = 1.5 + (bObj.avgBps / maxBps) * 5;

    const [, first] = wpts[0];
    const [, last]  = wpts[wpts.length - 1];
    const eeParts   = ee.split(/[〜～\-–—]/);
    const cityFrom  = eeParts[0]?.trim() || ee;
    const cityTo    = eeParts[1]?.trim() || ee;

    const arcPts = greatCirclePoints(first.lon, first.lat, last.lon, last.lat, 80);

    // Split at antimeridian relative to CENTER_LON
    const segments = []; let seg = [arcPts[0]];
    for (let i = 1; i < arcPts.length; i++) {
      let d = arcPts[i][0] - arcPts[i-1][0];
      while (d >  180) d -= 360;
      while (d < -180) d += 360;
      if (Math.abs(d) > 170) { segments.push(seg); seg = [arcPts[i]]; }
      else seg.push(arcPts[i]);
    }
    segments.push(seg);
    const crossed = segments.length > 1;

    segments.forEach((segPts, si) => {
      const sp = segPts.map(([lo, la]) => merc(lo, la));
      // Glow
      ctx.beginPath(); sp.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
      ctx.strokeStyle = `rgba(${rgb},0.08)`; ctx.lineWidth = thick*4;
      ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
      // Line
      ctx.beginPath(); sp.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
      ctx.strokeStyle = `rgba(${rgb},0.88)`; ctx.lineWidth = thick;
      ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
      // Flow dots
      const t = (Date.now() / 2000) % 1;
      for (let k = 0; k < 3; k++) {
        const ti = (t + k/3) % 1;
        const idx = Math.floor(ti * (sp.length-1));
        const [dx, dy] = sp[idx];
        ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${rgb},0.95)`; ctx.fill();
      }
      // Edge labels at map boundary cut
      if (crossed) {
        if (si === 0) {
          const [, ey] = sp[sp.length-1];
          edgeLabels.push({ x: W-10, y: ey, text: `→ ${cityTo}`,   rgb, align:'right' });
        } else {
          const [, ey] = sp[0];
          edgeLabels.push({ x: 10,   y: ey, text: `← ${cityFrom}`, rgb, align:'left'  });
        }
      }
    });

    // Midpoint label
    const firstSeg = segments[0].map(([lo,la]) => merc(lo, la));
    const mid = firstSeg[Math.floor(firstSeg.length / 2)];
    hitAreas.push({ ee, util, bObj, mx: mid[0], my: mid[1], rgb });

    // Waypoint nodes
    wpts.forEach(([, wp], i) => {
      const [nx, ny] = merc(wp.lon, wp.lat);
      const isEnd = i===0 || i===wpts.length-1;
      mercNodes.push({ nx, ny, isEnd, rgb });
    });
  }

  // ── Nodes ────────────────────────────────────────────────────────────────
  for (const {nx, ny, isEnd, rgb} of mercNodes) {
    ctx.beginPath(); ctx.arc(nx, ny, isEnd ? 5 : 3.5, 0, Math.PI*2);
    ctx.fillStyle = isEnd ? `rgba(${rgb},0.9)` : 'rgba(200,212,238,0.6)'; ctx.fill();
    ctx.strokeStyle = '#050810'; ctx.lineWidth = 1; ctx.stroke();
  }

  // ── Midpoint % labels ────────────────────────────────────────────────────
  const fszPct = Math.max(9, Math.min(12, W/90));
  ctx.font = `bold ${fszPct}px 'Space Mono'`; ctx.textAlign='center'; ctx.textBaseline='bottom';
  for (const {mx, my, util, rgb} of hitAreas) {
    ctx.fillStyle = `rgba(${rgb},1)`; ctx.fillText(`${util.toFixed(0)}%`, mx, my-5);
  }

  // ── Edge labels ───────────────────────────────────────────────────────────
  const fsz = Math.max(9, Math.min(11, W/100));
  ctx.font = `bold ${fsz}px 'Inter'`; ctx.textBaseline = 'middle';
  for (const lbl of edgeLabels) {
    ctx.textAlign = lbl.align;
    const x = lbl.align === 'right' ? W-10 : 10;
    const tw = ctx.measureText(lbl.text).width, pad = 4;
    const bx = lbl.align === 'right' ? x-tw-pad : x-pad;
    ctx.fillStyle = 'rgba(9,14,26,0.88)';
    ctx.beginPath(); ctx.roundRect(bx, lbl.y-fsz/2-pad, tw+pad*2, fsz+pad*2, 3); ctx.fill();
    ctx.fillStyle = `rgba(${lbl.rgb},1)`; ctx.fillText(lbl.text, x, lbl.y);
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.restore();

  // Animate
  animFrameId = requestAnimationFrame(() => {
    const slider = document.getElementById('time-slider');
    if (!slider) return;
    const bucket = res.allBuckets[+slider.value];
    if (bucket === activeBucket) drawMercator(res, activeBucket);
  });
}

function drawGlobe(res, activeBucket) {
  lastRes = res; lastRenderBucket = activeBucket;
  initGlobeDrag();
  const mc2 = document.getElementById('map-container'); if(mc2){mc2.classList.add('globe-mode');}

  const canvas = document.getElementById('world-canvas');
  if (!canvas) return;
  const container = document.getElementById('map-container');
  const dpr = window.devicePixelRatio || 1;
  const W = container.offsetWidth;
  const H = Math.round(W * 0.62);
  if (canvas.width !== W*dpr || canvas.height !== H*dpr) {
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.height = H + 'px';
  }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W*dpr, H*dpr);
  ctx.save(); ctx.scale(dpr, dpr);

  const cx = W/2, cy = H/2;
  const R  = Math.min(W, H) * 0.46;

  // ── Space / star background ──
  ctx.fillStyle='#000510'; ctx.fillRect(0,0,W,H);
  for (let i=0;i<220;i++){
    let x=i*2654435761>>>0; x=(x^x>>>16)*0x45d9f3b>>>0; x=(x^x>>>16)>>>0;
    let y=i*1013904223>>>0; y=(y^y>>>16)*0x45d9f3b>>>0; y=(y^y>>>16)>>>0;
    const sx=(x/0xffffffff)*W, sy=(y/0xffffffff)*H;
    const ss=0.3+(i%5)*0.18, op=0.25+(i%7)*0.10;
    ctx.beginPath(); ctx.arc(sx,sy,ss,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${op})`; ctx.fill();
  }

  // ── Outer atmosphere halo ──
  const halo=ctx.createRadialGradient(cx,cy,R*0.97,cx,cy,R*1.20);
  halo.addColorStop(0,'rgba(80,160,255,0.28)');
  halo.addColorStop(0.35,'rgba(50,120,220,0.10)');
  halo.addColorStop(0.7,'rgba(20,80,180,0.03)');
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,R*1.20,0,Math.PI*2);
  ctx.fillStyle=halo; ctx.fill();

  // ── Ocean disc ──
  const og=ctx.createRadialGradient(cx,cy,R*0.05,cx,cy,R);
  og.addColorStop(0,  '#2272b8');
  og.addColorStop(0.4,'#185a96');
  og.addColorStop(0.75,'#0e4278');
  og.addColorStop(1,  '#08243e');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle=og; ctx.fill();

  // ── Graticule ──
  ctx.strokeStyle='rgba(30,55,90,0.55)'; ctx.lineWidth=0.5;
  for (let lat=-60; lat<=60; lat+=30) {
    ctx.beginPath(); let first=true;
    for (let lon=-180; lon<=180; lon+=3) {
      const p = orthoProject(lon,lat,globeLon,globeLat,cx,cy,R);
      if (!p.visible) { first=true; continue; }
      first ? ctx.moveTo(p.px,p.py) : ctx.lineTo(p.px,p.py);
      first=false;
    }
    ctx.stroke();
  }
  for (let lon=-180; lon<=180; lon+=30) {
    ctx.beginPath(); let first=true;
    for (let lat=-89; lat<=89; lat+=3) {
      const p = orthoProject(lon,lat,globeLon,globeLat,cx,cy,R);
      if (!p.visible) { first=true; continue; }
      first ? ctx.moveTo(p.px,p.py) : ctx.lineTo(p.px,p.py);
      first=false;
    }
    ctx.stroke();
  }

  // ── Land (colored terrain) ──
  drawLandColored(ctx,
    (lon,lat) => orthoProject(lon,lat,globeLon,globeLat,cx,cy,R),
    true
  );

  // ── Atmosphere rim ──
  const limb=ctx.createRadialGradient(cx,cy,R*0.88,cx,cy,R);
  limb.addColorStop(0,'rgba(0,0,0,0)');
  limb.addColorStop(0.75,'rgba(30,100,220,0.12)');
  limb.addColorStop(1,'rgba(60,150,240,0.45)');
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=limb; ctx.fillRect(0,0,W,H); ctx.restore();

  // ── Globe border ──
  ctx.strokeStyle='rgba(80,150,255,0.35)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();

  // ── Arcs ──────────────────────────────────────────────────────────────
  const { eeStats, thWarn, thAlert } = res;
  hitAreas = [];
  const cityLabels = []; // drawn last, always on top
  const nodeList   = []; // drawn after arcs

  for (const [ee, stat] of Object.entries(eeStats)) {
    const bObj = stat.buckets.reduce((prev,cur) =>
      Math.abs(cur.bucket-activeBucket) < Math.abs(prev.bucket-activeBucket) ? cur : prev);
    const util = bObj.util;
    const wpts = Object.entries(bObj.waypoints);
    if (wpts.length < 2) continue;

    let rgb;
    if (util >= thAlert)     rgb='255,107,53';
    else if (util >= thWarn) rgb='255,200,50';
    else                     rgb='0,212,255';

    const maxBps = Math.max(...Object.values(eeStats).map(s=>s.avgBps));
    const thick  = 1.5 + (bObj.avgBps/maxBps)*4.5;

    const [,first] = wpts[0];
    const [,last]  = wpts[wpts.length-1];
    const arcPts   = greatCirclePoints(first.lon,first.lat,last.lon,last.lat,80);

    // Project all points
    const proj = arcPts.map(([lo,la]) => orthoProject(lo,la,globeLon,globeLat,cx,cy,R));

    // Split into visible sub-segments
    const subSegs = [];
    let cur = [];
    for (const p of proj) {
      if (p.visible) { cur.push(p); }
      else { if (cur.length>1) subSegs.push(cur); cur=[]; }
    }
    if (cur.length>1) subSegs.push(cur);

    for (const sp of subSegs) {
      // Glow
      ctx.beginPath();
      sp.forEach((p,i) => i===0?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py));
      ctx.strokeStyle=`rgba(${rgb},0.1)`; ctx.lineWidth=thick*4;
      ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
      // Line
      ctx.beginPath();
      sp.forEach((p,i) => i===0?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py));
      ctx.strokeStyle=`rgba(${rgb},0.9)`; ctx.lineWidth=thick;
      ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
    }

    // Animated flow dots (only on visible segments)
    const allVis = proj.filter(p=>p.visible);
    if (allVis.length > 1) {
      const t = (Date.now()/2000) % 1;
      for (let k=0;k<3;k++) {
        const ti = (t+k/3)%1;
        const idx = Math.floor(ti*(allVis.length-1));
        const p = allVis[idx];
        ctx.beginPath(); ctx.arc(p.px,p.py,3,0,Math.PI*2);
        ctx.fillStyle=`rgba(${rgb},0.95)`; ctx.fill();
      }
    }

    // Midpoint — collect for later draw
    const midVis = allVis[Math.floor(allVis.length/2)];
    if (midVis) hitAreas.push({ee,util,bObj,mx:midVis.px,my:midVis.py,rgb,midVis});

    // Collect city labels for later (drawn after all arcs)
    const eeParts = ee.split(/[〜～\-–—]/);
    const cityFrom = eeParts[0]?.trim()||ee;
    const cityTo   = eeParts[1]?.trim()||ee;
    const pF = orthoProject(first.lon,first.lat,globeLon,globeLat,cx,cy,R);
    const pL = orthoProject(last.lon, last.lat, globeLon,globeLat,cx,cy,R);
    if (pF.visible) cityLabels.push({p:pF, label:cityFrom, rgb});
    if (pL.visible) cityLabels.push({p:pL, label:cityTo,   rgb});

    // Waypoint nodes (collect for later)
    wpts.forEach(([,wp],i) => {
      const p = orthoProject(wp.lon,wp.lat,globeLon,globeLat,cx,cy,R);
      if (!p.visible) return;
      const isEnd = i===0||i===wpts.length-1;
      nodeList.push({p, isEnd, rgb});
    });
  }

  // ── Draw nodes on top of arcs ──────────────────────────────────────────
  for (const {p,isEnd,rgb} of nodeList) {
    ctx.beginPath(); ctx.arc(p.px,p.py,isEnd?5:3,0,Math.PI*2);
    ctx.fillStyle=isEnd?`rgba(${rgb},0.95)`:'rgba(180,200,230,0.7)'; ctx.fill();
    ctx.strokeStyle='rgba(5,8,16,0.8)'; ctx.lineWidth=1; ctx.stroke();
  }

  // ── Draw midpoint % labels ─────────────────────────────────────────────
  const fszM = Math.max(9,Math.min(12,W/80));
  ctx.font=`bold ${fszM}px 'Space Mono'`; ctx.textAlign='center'; ctx.textBaseline='bottom';
  for (const h of hitAreas) {
    if (!h.midVis) continue;
    ctx.fillStyle=`rgba(${h.rgb},1)`;
    ctx.fillText(`${h.util.toFixed(0)}%`, h.midVis.px, h.midVis.py-5);
  }

  // ── Draw city labels last (always on top) ─────────────────────────────
  const fszC = Math.max(9,Math.min(11,W/95));
  ctx.font=`bold ${fszC}px 'Inter'`; ctx.textAlign='center'; ctx.textBaseline='top';
  for (const {p,label,rgb} of cityLabels) {
    const tw = ctx.measureText(label).width;
    const pad=4, lx=p.px, ly=p.py+7;
    ctx.fillStyle='rgba(5,8,16,0.88)';
    ctx.beginPath(); ctx.roundRect(lx-tw/2-pad,ly-2,tw+pad*2,fszC+6,3); ctx.fill();
    ctx.fillStyle=`rgba(${rgb},1)`; ctx.fillText(label,lx,ly);
  }

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.restore();

  // Animate
  animFrameId = requestAnimationFrame(() => {
    const slider = document.getElementById('time-slider');
    if (!slider) return;
    const bucket = res.allBuckets[+slider.value];
    if (bucket === activeBucket) drawGlobe(res, activeBucket);
  });
}

function greatCirclePoints(lon1,lat1,lon2,lat2,n) {
  // Returns n+1 [lon,lat] points along great circle, lon in -180..180
  const toR = d => d*Math.PI/180;
  const toD = r => r*180/Math.PI;
  const la1=toR(lat1), lo1=toR(lon1), la2=toR(lat2), lo2=toR(lon2);
  // Central angle
  const cosD = Math.sin(la1)*Math.sin(la2)+Math.cos(la1)*Math.cos(la2)*Math.cos(lo2-lo1);
  const D = Math.acos(Math.max(-1, Math.min(1, cosD)));
  const sinD = Math.sin(D);
  const pts = [];
  for (let i=0; i<=n; i++) {
    const f = i/n;
    const A = sinD < 1e-10 ? (1-f) : Math.sin((1-f)*D) / sinD;
    const B = sinD < 1e-10 ? f     : Math.sin(f*D)     / sinD;
    const x = A*Math.cos(la1)*Math.cos(lo1) + B*Math.cos(la2)*Math.cos(lo2);
    const y = A*Math.cos(la1)*Math.sin(lo1) + B*Math.cos(la2)*Math.sin(lo2);
    const z = A*Math.sin(la1) + B*Math.sin(la2);
    let lon = toD(Math.atan2(y,x));
    const lat = toD(Math.atan2(z,Math.sqrt(x*x+y*y)));
    // Normalize lon to -180..180
    while (lon >  180) lon -= 360;
    while (lon < -180) lon += 360;
    pts.push([lon, lat]);
  }
  return pts;
}

// Canvas click → modal
document.addEventListener('click', e => {
  const canvas = document.getElementById('world-canvas');
  if (!canvas || e.target !== canvas) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (const h of hitAreas) {
    if (Math.hypot(mx-h.mx, my-h.my) < 30) {
      showModal(h);
      return;
    }
  }
});

// Hover tooltip
document.addEventListener('mousemove', e => {
  const canvas = document.getElementById('world-canvas');
  if (!canvas || e.target !== canvas) { hideTooltip(); return; }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (const h of hitAreas) {
    if (Math.hypot(mx-h.mx, my-h.my) < 30) {
      showTooltip(e.clientX, e.clientY, h);
      return;
    }
  }
  hideTooltip();
});

function showTooltip(cx, cy, h) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = h.ee;
  document.getElementById('tt-body').innerHTML =
    `収容率: <b style="color:rgba(${h.rgb},1)">${h.util.toFixed(1)}%</b><br>` +
    `平均帯域: ${fmtBps(h.bObj.avgBps)}<br>` +
    `経由リンク数: ${Object.keys(h.bObj.waypoints).length}<br>` +
    `<span style="color:var(--text-dim);font-size:10px">クリックで詳細を表示</span>`;
  tt.style.display = 'block';
  tt.style.left = (cx+14)+'px'; tt.style.top = (cy-10)+'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display='none'; }


// ── KPI Detail Modals ─────────────────────────────────────────────────────
function fmtBucketLabel(epochSec) {
  const d = new Date(epochSec * 1000);
  const p = n => String(n).padStart(2,'0');
  return `${d.getUTCFullYear()}-${p(d.getUTCMonth()+1)}-${p(d.getUTCDate())} ${p(d.getUTCHours())}:${p(d.getUTCMinutes())}`;
}

function utilColor(u, thWarn, thAlert) {
  if (u >= thAlert) return 'var(--alert)';
  if (u >= thWarn)  return 'var(--warn)';
  return 'var(--green)';
}

function showKpiDetail(type) {
  if (!analysisResult) return;
  const { eeStats, allBuckets, thWarn, thAlert } = analysisResult;
  const ees = Object.entries(eeStats);

  let title = '', body = '';

  if (type === 'routes') {
    // ── 全通信区間一覧 ──────────────────────────────────────────────
    title = `通信区間一覧（全 ${ees.length} 区間）`;
    const sorted = ees.sort((a,b) => b[1].maxU - a[1].maxU);
    body = `<table style="width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:11px;">
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">区間名</th>
        <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">最大収容率</th>
        <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">平均収容率</th>
        <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">平均帯域</th>
      </tr></thead><tbody>
      ${sorted.map(([ee,s]) => `<tr>
        <td style="padding:6px 8px;border-bottom:1px solid rgba(30,45,74,.4);white-space:nowrap">${ee}</td>
        <td style="padding:6px 8px;border-bottom:1px solid rgba(30,45,74,.4);text-align:right;color:${utilColor(s.maxU,thWarn,thAlert)}">${s.maxU.toFixed(1)}%</td>
        <td style="padding:6px 8px;border-bottom:1px solid rgba(30,45,74,.4);text-align:right;color:var(--text-dim)">${s.avgU.toFixed(1)}%</td>
        <td style="padding:6px 8px;border-bottom:1px solid rgba(30,45,74,.4);text-align:right;color:var(--text-dim)">${fmtBps(s.avgBps)}</td>
      </tr>`).join('')}
      </tbody></table>`;
  }

  else if (type === 'peak') {
    // ── 最大収容率の詳細 ────────────────────────────────────────────
    // Find which EE and which bucket had the peak
    let peakEE = '', peakBucket = 0, peakUtil = 0;
    for (const [ee, s] of ees) {
      for (const b of s.buckets) {
        if (b.util > peakUtil) { peakUtil = b.util; peakEE = ee; peakBucket = b.bucket; }
      }
    }
    title = '最大収容率 詳細';
    // Top 5 peak moments across all EEs
    const peaks = [];
    for (const [ee, s] of ees) {
      for (const b of s.buckets) peaks.push({ ee, bucket: b.bucket, util: b.util, avgBps: b.avgBps });
    }
    peaks.sort((a,b) => b.util - a.util);
    const top = peaks.slice(0, 10);
    body = `
      <div style="margin-bottom:14px;padding:12px;background:var(--bg-panel);border-radius:6px;border:1px solid var(--border)">
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">ピーク発生</div>
        <div style="font-family:'Space Mono',monospace;color:var(--alert);font-size:20px;font-weight:700">${peakUtil.toFixed(1)}%</div>
        <div style="font-size:12px;color:var(--text);margin-top:4px">${peakEE}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${fmtBucketLabel(peakBucket)}</div>
      </div>
      <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase">収容率 上位10件</div>
      <table style="width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:11px;">
        <thead><tr>
          <th style="text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">区間</th>
          <th style="text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">時刻</th>
          <th style="text-align:right;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px">収容率</th>
        </tr></thead><tbody>
        ${top.map(p => `<tr>
          <td style="padding:5px 8px;border-bottom:1px solid rgba(30,45,74,.4);white-space:nowrap">${p.ee}</td>
          <td style="padding:5px 8px;border-bottom:1px solid rgba(30,45,74,.4);color:var(--text-dim)">${fmtBucketLabel(p.bucket)}</td>
          <td style="padding:5px 8px;border-bottom:1px solid rgba(30,45,74,.4);text-align:right;color:${utilColor(p.util,thWarn,thAlert)}">${p.util.toFixed(1)}%</td>
        </tr>`).join('')}
        </tbody></table>`;
  }

  else if (type === 'danger') {
    // ── 危険経路一覧 ────────────────────────────────────────────────
    const dangerEEs = ees.filter(([,s]) => s.maxU >= thAlert);
    title = `危険経路 詳細（閾値 ${thAlert}%超）`;
    if (dangerEEs.length === 0) {
      body = `<div style="text-align:center;padding:32px;color:var(--green);font-family:'Space Mono',monospace">✓ 危険な経路はありません</div>`;
    } else {
      body = dangerEEs.sort((a,b) => b[1].maxU - a[1].maxU).map(([ee, s]) => {
        const dangerBuckets = s.buckets.filter(b => b.util >= thAlert);
        return `
          <div style="margin-bottom:14px;padding:12px;background:var(--bg-panel);border-radius:6px;border:1px solid rgba(255,107,53,.3)">
            <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--alert);margin-bottom:8px">${ee}</div>
            <div style="display:flex;gap:16px;font-size:11px;color:var(--text-dim);margin-bottom:8px">
              <span>最大: <b style="color:var(--alert)">${s.maxU.toFixed(1)}%</b></span>
              <span>発生: <b style="color:var(--text)">${dangerBuckets.length}回</b></span>
              <span>平均帯域: <b style="color:var(--text)">${fmtBps(s.avgBps)}</b></span>
            </div>
            <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px">超過時刻</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${dangerBuckets.slice(0,12).map(b => `<span style="font-family:'Space Mono',monospace;font-size:9px;background:rgba(255,107,53,.12);color:var(--alert);border:1px solid rgba(255,107,53,.25);border-radius:3px;padding:2px 6px">${fmtBucketLabel(b.bucket)}</span>`).join('')}
              ${dangerBuckets.length > 12 ? `<span style="font-size:9px;color:var(--text-dim)">… 他${dangerBuckets.length-12}件</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }
  }

  else if (type === 'slots') {
    // ── 時間帯別 全体平均収容率 ─────────────────────────────────────
    title = `集計時間帯（全 ${allBuckets.length} スロット）`;
    // Compute average utilization across all EEs per bucket
    const avgByBucket = allBuckets.map(bucket => {
      const utils = ees.map(([,s]) => {
        const b = s.buckets.find(b => b.bucket === bucket);
        return b ? b.util : null;
      }).filter(v => v !== null);
      return { bucket, avg: utils.reduce((s,v)=>s+v,0)/utils.length, max: Math.max(...utils) };
    });
    const maxAvg = Math.max(...avgByBucket.map(b => b.max));
    body = `
      <div style="font-size:10px;color:var(--text-dim);margin-bottom:10px">各時間帯の全通信区間 平均収容率 / 最大収容率</div>
      <div style="max-height:360px;overflow-y:auto">
      <table style="width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:11px;">
        <thead><tr>
          <th style="text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px;position:sticky;top:0;background:var(--bg-panel)">#</th>

}

function showModal(h) {
  hideTooltip();
  document.getElementById('modal-title').textContent = `${h.ee} — 経由リンク詳細`;
  const wpts = Object.entries(h.bObj.waypoints);
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:12px;font-size:12px;color:var(--text-dim)">
      収容率: <span style="color:rgba(${h.rgb},1);font-weight:700">${h.util.toFixed(1)}%</span>　
      平均帯域: <span style="color:var(--text)">${fmtBps(h.bObj.avgBps)}</span>
    </div>
    <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:8px">
      ${wpts.length} リンク経由
    </div>
    ${wpts.map(([lid,wp],i)=>`
      <div class="link-row">
        <span style="color:var(--text-dim);font-size:10px;min-width:20px">${i+1}.</span>
        <span class="link-id">${lid}</span>
        <span class="link-coords">${wp.lat.toFixed(4)}, ${wp.lon.toFixed(4)}</span>
      </div>`).join('')}`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

// ══════════════════════════════════════════════════════
// TIMELINE CANVAS
// ══════════════════════════════════════════════════════
function drawTimeline(data, thWarn, thAlert) {
  const canvas = document.getElementById('timeline-canvas');
  if (!canvas || !data) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 180 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W=canvas.offsetWidth, H=180;
  const PAD={t:14,r:16,b:34,l:50};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;

  ctx.fillStyle='#0a0e1a'; ctx.fillRect(0,0,W,H);

  const vals = data.map(d=>d.util);
  const maxV = Math.max(100, Math.max(...vals));
  const n = data.length;
  if (n < 2) return;

  ctx.strokeStyle='#1e2d4a'; ctx.lineWidth=0.5;
  for (let v=0; v<=maxV; v+=20) {
    const y=PAD.t+ch-(v/maxV)*ch;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cw,y); ctx.stroke();
    ctx.fillStyle='#4a5570'; ctx.font=`10px 'Space Mono'`;
    ctx.fillText(v+'%',PAD.l-38,y+4);
  }

  function thLine(pct,color,label){
    const y=PAD.t+ch-(pct/maxV)*ch;
    ctx.save(); ctx.setLineDash([4,4]);
    ctx.strokeStyle=color; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cw,y); ctx.stroke();
    ctx.fillStyle=color; ctx.font=`10px 'Inter'`;
    ctx.fillText(label,PAD.l+cw-52,y-3);
    ctx.restore();
  }
  thLine(thWarn,'#ffc832','警告 '+thWarn+'%');
  thLine(thAlert,'#ff6b35','危険 '+thAlert+'%');

  const grad=ctx.createLinearGradient(0,PAD.t,0,PAD.t+ch);
  grad.addColorStop(0,'rgba(0,212,255,0.28)'); grad.addColorStop(1,'rgba(0,212,255,0.01)');
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=PAD.l+(i/(n-1))*cw, y=PAD.t+ch-(d.util/maxV)*ch;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(PAD.l+cw,PAD.t+ch); ctx.lineTo(PAD.l,PAD.t+ch); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=PAD.l+(i/(n-1))*cw, y=PAD.t+ch-(d.util/maxV)*ch;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#00d4ff'; ctx.lineWidth=2; ctx.setLineDash([]); ctx.stroke();

  data.forEach((d,i)=>{
    if(d.util<thWarn) return;
    const x=PAD.l+(i/(n-1))*cw, y=PAD.t+ch-(d.util/maxV)*ch;
    const col=d.util>=thAlert?'#ff6b35':'#ffc832';
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='#0a0e1a'; ctx.lineWidth=1.2; ctx.stroke();
  });

  const step=Math.max(1,Math.floor(n/8));
  ctx.fillStyle='#4a5570'; ctx.font=`9px 'Space Mono'`; ctx.textAlign='center';
  data.forEach((d,i)=>{
    if(i%step!==0&&i!==n-1) return;
    const x=PAD.l+(i/(n-1))*cw;
    const dd=new Date(d.bucket*1000);
    const lbl=`${String(dd.getUTCHours()).padStart(2,'0')}:${String(dd.getUTCMinutes()).padStart(2,'0')}`;
    ctx.fillText(lbl,x,H-PAD.b+13);
  });
  ctx.textAlign='left';
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function fmtBps(bps){
  if(bps>=1e9) return (bps/1e9).toFixed(2)+' Gbps';
  if(bps>=1e6) return (bps/1e6).toFixed(2)+' Mbps';
  if(bps>=1e3) return (bps/1e3).toFixed(1)+' Kbps';
  return bps.toFixed(0)+' bps';
}
function setStatus(active,msg){
  document.getElementById('status-text').innerHTML=
    `<span class="status-dot ${active?'active':''}"></span>${msg}`;
}

window.addEventListener('resize',()=>{
  if(!analysisResult) return;
  const slider=document.getElementById('time-slider');
  drawWorldMap(analysisResult, analysisResult.allBuckets[+slider.value]);
  const sel=document.getElementById('ee-select');
  if(sel) drawTimeline(analysisResult.eeStats[sel.value].buckets,
    analysisResult.thWarn, analysisResult.thAlert);
});
